<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的交互网页</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { padding: 8px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        #result { margin-top: 20px; font-weight: bold; color: #333; } 
    </style>
</head>
<body>

<div class="card">
    <h2>公里转英里转换器</h2>
    <input type="number" id="kmInput" placeholder="输入公里数...">
    <button onclick="convert()">转换</button>
    <div id="result"></div>
</div>

<script>
    function convert() {
        const km = document.getElementById('kmInput').value;
        if (km === "") {
            alert("请输入数字");
            return;
        }
        const miles = km * 0.621371;
        document.getElementById('result').innerText = km + " 公里 = " + miles.toFixed(2) + " 英里";
    }
</script>

</body>
</html>
